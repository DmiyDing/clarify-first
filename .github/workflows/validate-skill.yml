name: validate-skill

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch Anthropic skill-creator
        run: git clone --depth=1 https://github.com/anthropics/skills.git /tmp/anthropic-skills

      - name: Configure skill-creator path
        run: echo "SKILL_CREATOR_ROOT=/tmp/anthropic-skills/skills/skill-creator" >> "$GITHUB_ENV"

      - name: Verify versions
        run: npm run verify-version

      - name: Validate skill
        run: npm run validate:skill
